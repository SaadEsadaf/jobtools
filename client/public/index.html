<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobTools — Marketing Lab</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d0d; color: #e0e0e0; }

    .login-page { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 40px; width: 360px; }
    .login-box h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
    .login-box p { color: #888; margin-bottom: 24px; font-size: 14px; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 12px; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font-size: 14px; }
    .login-box button { width: 100%; padding: 12px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
    .login-box button:hover { background: #c73652; }
    .login-box .error { color: #e94560; font-size: 13px; margin-top: 8px; }

    .app { display: none; }
    .app.active { display: block; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; }
    .topbar h1 { font-size: 18px; color: #fff; }
    .topbar h1 span { color: #e94560; }
    .topbar .subtitle { color: #666; font-size: 12px; margin-top: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-right .user { color: #888; font-size: 13px; }
    .topbar-right button { padding: 6px 14px; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; color: #ccc; cursor: pointer; font-size: 12px; }
    .topbar-right button:hover { background: #3a3a3a; }

    .nav-tabs { display: flex; gap: 0; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 0 16px; }
    .nav-tabs button { padding: 12px 20px; background: transparent; border: none; color: #666; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; transition: all .2s; }
    .nav-tabs button:hover { color: #ccc; }
    .nav-tabs button.active { color: #e94560; border-bottom-color: #e94560; }

    .content { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 20px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .stat-card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .sub { font-size: 11px; color: #555; margin-top: 8px; }

    .section { margin-bottom: 32px; }
    .section h2 { font-size: 16px; color: #fff; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #2a2a2a; }
    .section h2 .badge { display: inline-block; background: #e94560; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    table th { text-align: left; padding: 10px 12px; color: #888; font-weight: 500; border-bottom: 1px solid #2a2a2a; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
    table td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; }
    table tr:hover td { background: #151515; }

    .filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .filters select, .filters input { padding: 8px 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; color: #ccc; font-size: 13px; }
    .filters input { min-width: 200px; }
    .filters button, .btn { padding: 8px 16px; background: #e94560; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn:hover { background: #c73652; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-secondary { background: #2a2a2a; border: 1px solid #3a3a3a; color: #ccc; }
    .btn-secondary:hover { background: #3a3a3a; }
    .btn-success { background: #2e7d32; }
    .btn-success:hover { background: #1b5e20; }
    .btn-warning { background: #e65100; }
    .btn-warning:hover { background: #bf360c; }

    .badge-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-new { background: #1a237e; color: #7986cb; }
    .badge-contacted { background: #1b5e20; color: #81c784; }
    .badge-interested { background: #e65100; color: #ffb74d; }
    .badge-unsubscribed { background: #b71c1c; color: #ef9a9a; }
    .badge-pending { background: #3e2723; color: #bcaaa4; }
    .badge-executed { background: #1b5e20; color: #81c784; }
    .badge-delivered { background: #1b5e20; color: #81c784; }

    .flex { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px; margin-bottom: 12px; flex: 1; min-width: 280px; }
    .card h3 { color: #fff; font-size: 14px; margin-bottom: 8px; }
    .card p { color: #888; font-size: 13px; }
    .card .meta { color: #555; font-size: 11px; margin-top: 8px; }

    .breakdown-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .breakdown-item { display: flex; justify-content: space-between; padding: 8px 12px; background: #151515; border-radius: 6px; font-size: 13px; }
    .breakdown-item .key { color: #ccc; }
    .breakdown-item .val { color: #e94560; font-weight: 600; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal h2 { color: #fff; font-size: 18px; margin-bottom: 16px; }
    .modal label { display: block; color: #888; font-size: 12px; margin-bottom: 4px; }
    .modal input, .modal select, .modal textarea { width: 100%; padding: 10px; margin-bottom: 12px; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px; color: #fff; font-size: 13px; }
    .modal textarea { min-height: 100px; resize: vertical; font-family: inherit; }
    .modal .btn-group { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

    .pagination { display: flex; gap: 4px; align-items: center; margin-top: 12px; font-size: 12px; }
    .pagination button { padding: 4px 10px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; color: #ccc; cursor: pointer; }
    .pagination span { color: #666; }

    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
    .alert-success { background: #1b5e20; color: #a5d6a7; border: 1px solid #2e7d32; }
    .alert-error { background: #b71c1c; color: #ef9a9a; border: 1px solid #c62828; }
    .alert-info { background: #1a237e; color: #9fa8da; border: 1px solid #283593; }

    .mono { font-family: monospace; font-size: 11px; color: #888; word-break: break-all; }
    .ta-right { text-align: right; }

    .inject-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .inject-actions button { padding: 4px 10px; font-size: 11px; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 4px; color: #ccc; cursor: pointer; }
    .inject-actions button:hover { background: #3a3a3a; }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 2000; animation: slideIn .3s ease; }
    .toast-success { background: #1b5e20; color: #a5d6a7; border: 1px solid #2e7d32; }
    .toast-error { background: #b71c1c; color: #ef9a9a; border: 1px solid #c62828; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width: 600px) {
      .nav-tabs { overflow-x: auto; }
      .nav-tabs button { padding: 10px 14px; font-size: 12px; white-space: nowrap; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .filters { flex-direction: column; }
      .filters input { min-width: 0; }
    }
  </style>
</head>
<body>
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>🔧 JobTools</h1>
    <p>Marketing Lab — connexion sécurisée</p>
    <input type="text" id="loginUser" placeholder="Nom d'utilisateur" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Mot de passe" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Se connecter</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div>
      <h1>🔧 <span>JobTools</span> Marketing Lab</h1>
      <div class="subtitle">Environnement marketing indépendant lié à IPTV-Boss</div>
    </div>
    <div class="topbar-right">
      <span class="user" id="userDisplay"></span>
      <button onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="nav-tabs" id="navTabs">
    <button class="active" data-tab="dashboard">📊 Tableau de bord</button>
    <button data-tab="leads">👥 Leads</button>
    <button data-tab="campaigns">📢 Campagnes</button>
    <button data-tab="templates">📝 Templates</button>
    <button data-tab="injection">⚡ Injection</button>
    <button data-tab="queue">📦 File d'attente</button>
    <button data-tab="brain">🧠 Pont IPTV-Boss</button>
    <button data-tab="ai">🤖 IA</button>
    <button data-tab="sniffers">🕵️ Sniffeurs</button>
    <button data-tab="apis">🔌 APIs Sociales</button>
    <button data-tab="automations">⚡ Automations</button>
    <button data-tab="thesis">🎓 Thesis Demo</button>
    <button data-tab="settings">⚙️ Paramètres</button>
  </div>

  <div class="content">
    <div class="tab-content active" id="tab-dashboard"></div>
    <div class="tab-content" id="tab-leads"></div>
    <div class="tab-content" id="tab-campaigns"></div>
    <div class="tab-content" id="tab-templates"></div>
    <div class="tab-content" id="tab-injection"></div>
    <div class="tab-content" id="tab-queue"></div>
    <div class="tab-content" id="tab-brain"></div>
    <div class="tab-content" id="tab-ai"></div>
    <div class="tab-content" id="tab-sniffers"></div>
    <div class="tab-content" id="tab-apis"></div>
    <div class="tab-content" id="tab-automations"></div>
    <div class="tab-content" id="tab-thesis"></div>
    <div class="tab-content" id="tab-settings"></div>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('jobtools_token') || ''
let USER = JSON.parse(localStorage.getItem('jobtools_user') || 'null')

const API = window.location.origin + '/api'

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers }
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN
  const res = await fetch(API + path, { ...opts, headers })
  if (res.status === 401) { doLogout(); return null }
  return res.json()
}

function showToast(msg, type = 'success') { const el = document.createElement('div'); el.className = 'toast toast-' + type; el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 3000) }
function $(id) { return document.getElementById(id) }
function el(tag, attrs = {}, ...children) { const e = document.createElement(tag); Object.entries(attrs).forEach(([k, v]) => { if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v); else if (k === 'className') e.className = v; else e.setAttribute(k, v) }); children.forEach(c => { if (typeof c === 'string') e.appendChild(document.createTextNode(c)); else if (c) e.appendChild(c) }); return e }

function statusBadge(s) { const colors = { new: 'badge-new', contacted: 'badge-contacted', interested: 'badge-interested', unsubscribed: 'badge-unsubscribed', pending: 'badge-pending', executed: 'badge-executed', delivered: 'badge-delivered' }; return el('span', { className: 'badge-status ' + (colors[s] || 'badge-new') }, s || 'unknown') }

function doLogin() {
  const username = $('loginUser').value
  const password = $('loginPass').value
  fetch(API + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
    .then(r => r.json())
    .then(d => {
      if (d.token) { TOKEN = d.token; USER = d.user; localStorage.setItem('jobtools_token', TOKEN); localStorage.setItem('jobtools_user', JSON.stringify(USER)); $('loginPage').style.display = 'none'; $('app').classList.add('active'); initApp() }
      else { $('loginError').textContent = d.error || 'Échec de connexion' }
    })
    .catch(e => { $('loginError').textContent = 'Erreur de connexion: ' + e.message })
}

function doLogout() { TOKEN = ''; USER = null; localStorage.removeItem('jobtools_token'); localStorage.removeItem('jobtools_user'); $('loginPage').style.display = 'flex'; $('app').classList.remove('active') }

if (TOKEN && USER) { $('loginPage').style.display = 'none'; $('app').classList.add('active'); initApp() }

function initApp() {
  $('userDisplay').textContent = USER?.username || 'admin'
  document.querySelectorAll('#navTabs button').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('#navTabs button').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
      btn.classList.add('active')
      $('tab-' + btn.dataset.tab).classList.add('active')
      loadTab(btn.dataset.tab)
    }
  })
  loadTab('dashboard')
}

function loadTab(name) {
  if (name === 'dashboard') loadDashboard()
  else if (name === 'leads') loadLeads()
  else if (name === 'campaigns') loadCampaigns()
  else if (name === 'templates') loadTemplates()
  else if (name === 'injection') loadInjection()
  else if (name === 'queue') loadQueue()
  else if (name === 'brain') loadBrain()
  else if (name === 'ai') loadAI()
  else if (name === 'sniffers') loadSniffers()
  else if (name === 'apis') loadAPIs()
  else if (name === 'automations') loadAutomations()
  else if (name === 'thesis') loadThesis()
  else if (name === 'settings') loadSettings()
}

// ==================== DASHBOARD ====================
async function loadDashboard() {
  const data = await api('/stats')
  if (!data) return
  const { stats, breakdowns, snifferStats, recentInjectionLog, recentQueue, brainStatus, recentLeads } = data
  const container = $('tab-dashboard')

  container.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="value">${stats.totalLeads}</div><div class="label">👥 Total Leads</div><div class="sub">${stats.leadsWithEmail} avec email · ${stats.leadsWithPhone} avec téléphone</div></div>
      <div class="stat-card"><div class="value">${stats.highIntent}</div><div class="label">🔥 Haute intention</div><div class="sub">Score ≥ 7</div></div>
      <div class="stat-card"><div class="value">${stats.totalCampaigns}</div><div class="label">📢 Campagnes</div><div class="sub">${stats.executedCampaigns} exécutées</div></div>
      <div class="stat-card"><div class="value">${stats.pendingQueue}</div><div class="label">📦 En attente</div><div class="sub">Contenu à poster</div></div>
      <div class="stat-card"><div class="value">${stats.injections}</div><div class="label">⚡ Injections</div><div class="sub">Templates injectés</div></div>
      <div class="stat-card"><div class="value">${stats.brainDelivered}</div><div class="label">🧠 Pont IPTV-Boss</div><div class="sub">Notifications envoyées</div></div>
      <div class="stat-card"><div class="value">${stats.aiCalls}</div><div class="label">🤖 Appels IA</div><div class="sub">${stats.aiToday} aujourd'hui · ${stats.aiSuccess} succès</div></div>
      <div class="stat-card"><div class="value">${stats.scheduledCount || 0}</div><div class="label">📅 Publications programmées</div><div class="sub">En attente</div></div>
      <div class="stat-card"><div class="value">${(snifferStats?.leadsToday) || 0}</div><div class="label">📅 Leads aujourd'hui</div><div class="sub">${(snifferStats?.enrichedCount) || 0} enrichis</div></div>
    </div>

    <div class="flex">
      <div class="card">
        <h3>🔀 Sources des leads</h3>
        ${breakdowns.sourceBreakdown.map(s => `<div class="breakdown-item"><span class="key">${s.source || 'inconnu'}</span><span class="val">${s.count}</span></div>`).join('')}
      </div>
      <div class="card">
        <h3>🌐 Langues</h3>
        ${breakdowns.langBreakdown.map(s => `<div class="breakdown-item"><span class="key">${s.language || 'inconnu'}</span><span class="val">${s.count}</span></div>`).join('')}
      </div>
      <div class="card">
        <h3>🎯 Intentions</h3>
        ${breakdowns.intentBreakdown.map(s => `<div class="breakdown-item"><span class="key">${s.intent_label || 'non classé'}</span><span class="val">${s.count}</span></div>`).join('')}
      </div>
    </div>

    <div class="flex">
      <div class="card">
        <h3>🤖 Utilisation IA par provider</h3>
        ${data.aiUsage?.byProvider?.length ? `<table><tr><th>Provider</th><th>Appels</th><th>Succès</th><th>Ø ms</th></tr>${data.aiUsage.byProvider.map(p => `<tr><td>${p.provider}</td><td>${p.count}</td><td>${p.success_count || 0}</td><td>${p.avg_ms || '-'}</td></tr>`).join('')}</table>` : '<p style="color:#555">Aucun appel IA encore</p>'}
      </div>
      <div class="card">
        <h3>📅 Publications programmées</h3>
        ${data.scheduledUpcoming?.length ? `<table><tr><th>Plateforme</th><th>Titre</th><th>Prévu le</th></tr>${data.scheduledUpcoming.map(p => `<tr><td>${p.platform}</td><td>${p.title || '-'}</td><td>${new Date(p.scheduled_at).toLocaleString()}</td></tr>`).join('')}</table>` : '<p style="color:#555">Aucune programmation</p>'}
      </div>
    </div>

    <div class="section">
      <h2>🕐 Dernières injections</h2>
      ${recentInjectionLog.length ? `<table><tr><th>Type</th><th>Cible</th><th>Statut</th><th>Date</th></tr>${recentInjectionLog.map(l => `<tr><td>${l.injection_type}</td><td>${l.target}</td><td>${statusBadge(l.status)}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`).join('')}</table>` : '<p style="color:#555">Aucune injection pour le moment</p>'}
    </div>

    <div class="section">
      <h2>🧠 Pont IPTV-Boss — Derniers événements</h2>
      ${brainStatus.length ? `<table><tr><th>Événement</th><th>Statut</th><th>Date</th></tr>${brainStatus.map(b => `<tr><td>${b.event_type}</td><td>${statusBadge(b.status)}</td><td>${new Date(b.created_at).toLocaleString()}</td></tr>`).join('')}</table>` : '<p style="color:#555">Aucun événement</p>'}
    </div>
  `
}

// ==================== LEADS ====================
async function loadLeads(page = 1) {
  const sourcesSelect = $('leads-sources')
  const langsSelect = $('leads-langs')
  const intentsSelect = $('leads-intents')

  const params = new URLSearchParams({ page, limit: 50 })
  if (sourcesSelect?.value) params.set('source', sourcesSelect.value)
  if (langsSelect?.value) params.set('language', langsSelect.value)
  if (intentsSelect?.value) params.set('intent', intentsSelect.value)
  if ($('leads-search')?.value) params.set('search', $('leads-search').value)

  const data = await api('/leads?' + params.toString())
  if (!data) return

  const container = $('tab-leads')
  container.innerHTML = `
    <div class="section">
      <h2>👥 Leads <span class="badge">${data.total}</span></h2>
      <div class="filters">
        <select id="leads-sources"><option value="">Toutes sources</option>${data.sources.map(s => '<option value="'+s+'">'+s+'</option>').join('')}</select>
        <select id="leads-langs"><option value="">Toutes langues</option>${data.languages.map(s => '<option value="'+s+'">'+s+'</option>').join('')}</select>
        <select id="leads-intents"><option value="">Toutes intentions</option>${data.intents.map(s => '<option value="'+s+'">'+s+'</option>').join('')}</select>
        <input id="leads-search" placeholder="🔍 Rechercher..." onkeydown="if(event.key==='Enter')loadLeads()">
        <button onclick="loadLeads()">Filtrer</button>
        <button class="btn-secondary" onclick="importFromIPTV()">📥 Importer d'IPTV-Boss</button>
        <button class="btn-secondary" onclick="exportLeadsCSV()">📤 Export CSV</button>
        <button class="btn-secondary" onclick="enrichLeads()">🧠 Enrichir IA</button>
      </div>
      <table>
        <tr><th>ID</th><th>Source</th><th>Langue</th><th>Utilisateur</th><th>Téléphone</th><th>Email</th><th>Intention</th><th>Score</th><th>Statut</th><th>Date</th></tr>
        ${data.leads.map(l => `<tr><td>${l.id}</td><td>${l.source || '-'}</td><td>${l.language || '-'}</td><td>${l.username || l.first_name || '-'}</td><td>${l.phone || '-'}</td><td>${l.email || '-'}</td><td>${l.intent_label || '-'}</td><td>${l.intent_score}</td><td>${statusBadge(l.status)}</td><td>${new Date(l.created_at).toLocaleDateString()}</td></tr>`).join('')}
      </table>
      <div class="pagination">
        <button onclick="loadLeads(${data.page - 1})" ${data.page <= 1 ? 'disabled' : ''}>← Précédent</button>
        <span>Page ${data.page} / ${Math.ceil(data.total / data.limit)}</span>
        <button onclick="loadLeads(${data.page + 1})" ${data.page * data.limit >= data.total ? 'disabled' : ''}>Suivant →</button>
      </div>
    </div>
  `

  if (sourcesSelect) sourcesSelect.onchange = () => loadLeads()
  if (langsSelect) langsSelect.onchange = () => loadLeads()
  if (intentsSelect) intentsSelect.onchange = () => loadLeads()
}

async function importFromIPTV() {
  const btn = event.target
  btn.disabled = true

  if ($('leads-intents')?.value) params.set('intent', $('leads-intents').value)

}

        </label>
      </div>
      <div class="provider-fields-${key}" style="margin-top:8px;display:${prov.enabled ? 'block' : 'none'}">
        ${meta.fields.map(f => {
          if (f === 'apiKey') return `<label style="font-size:11px;color:#666;display:block">Clé API</label><input class="ai-field" data-provider="${key}" data-field="apiKey" value="${prov.apiKey || ''}" placeholder="sk-..." style="width:100%;padding:6px 10px;margin-bottom:6px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;color:#fff;font-size:12px;font-family:monospace">`
          if (f === 'url') return `<label style="font-size:11px;color:#666;display:block">URL</label><input class="ai-field" data-provider="${key}" data-field="url" value="${prov.url || ''}" style="width:100%;padding:6px 10px;margin-bottom:6px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;color:#fff;font-size:12px;font-family:monospace">`
          if (f === 'model') return `<label style="font-size:11px;color:#666;display:block">Modèle</label><input class="ai-field" data-provider="${key}" data-field="model" value="${prov.model || ''}" style="width:100%;padding:6px 10px;margin-bottom:6px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;color:#fff;font-size:12px">`
          return ''
        }).join('')}
        <button class="btn-sm btn-secondary" onclick="testAI('${key}')" style="margin-top:4px">🧪 Tester</button>
        <span id="ai-test-${key}" style="font-size:11px;margin-left:8px"></span>
      </div>
    </div>`
  }).join('')
}

function toggleAIProvider(key, enabled) {
  const fields = document.querySelector('.provider-fields-' + key)
  if (fields) fields.style.display = enabled ? 'block' : 'none'
}

function collectAIProviders() {
  const providers = {}
  document.querySelectorAll('[data-provider]').forEach(el => {
    const key = el.dataset.provider
    const enabled = el.querySelector('input[type=checkbox]').checked
    providers[key] = { enabled }
    el.querySelectorAll('.ai-field').forEach(inp => {
      providers[key][inp.dataset.field] = inp.value
    })
  })
  return providers
}

  const providers = collectAIProviders()

async function testAllAI() {
  const providers = collectAIProviders()
  await saveAI()

    await testAI(key)
  }
}

function renderAPIs(apis) {

  const apiMeta = {

    reddit: { label: '👽 Reddit', fields: ['clientId', 'clientSecret', 'username', 'password'] },

    return `<div class="card" style="margin-bottom:8px;padding:12px" data-api="${key}">
      <div class="flex" style="justify-content:space-between;align-items:center">
        <div><strong>${meta.label}</strong></div>

        </label>
      </div>
      <div class="api-fields-${key}" style="margin-top:8px;display:${api.enabled ? 'block' : 'none'}">

  }).join('')
}

function toggleAPI(key, enabled) {
  document.querySelector('.api-fields-' + key).style.display = enabled ? 'block' : 'none'
}

function collectAPIs() {
  const apis = {}
  document.querySelectorAll('[data-api]').forEach(el => {
    const key = el.dataset.api
    const enabled = el.querySelector('input[type=checkbox]').checked
    apis[key] = { enabled }
    el.querySelectorAll('.api-field').forEach(inp => {
      apis[key][inp.dataset.field] = inp.value
    })
  })
  return apis
}

  const apis = collectAPIs()

async function loadCalendar() {
  const res = await api('/schedule/calendar')
  if (!res) return
  const calDiv = $('calendar-content')
  if (!calDiv) return
  const { posts, grouped } = res
  const days = Object.keys(grouped).sort()
  if (!days.length) { calDiv.innerHTML = '<p style="color:#555">Aucune publication programmée</p>'; return }

  const weekDays = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam']
  const months = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc']

  let html = ''
  for (const day of days) {
    const d = new Date(day + 'T12:00:00')
    const label = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} (${weekDays[d.getDay()]})`
    const dayPosts = grouped[day]
    html += `<div style="margin-bottom:12px"><strong style="color:#4fc3f7;font-size:13px">${label}</strong> <span class="badge-status ${dayPosts.some(p=>p.status==='pending')?'badge-new':'badge-executed'}" style="font-size:10px">${dayPosts.length}</span>`
    html += dayPosts.map(p => `<div class="flex" style="justify-content:space-between;align-items:center;padding:6px 8px;background:#151515;border-radius:4px;margin-top:4px">
      <div><span style="font-size:12px;color:#888">${p.platform}</span> <span style="font-size:12px;color:#ccc">${p.title || p.action_type}</span> ${p.ai_generated ? '<span class="badge-status badge-new" style="font-size:9px">🤖IA</span>' : ''}</div>
      <div><span class="badge-status ${p.status === 'posted' ? 'badge-executed' : p.status === 'failed' ? 'badge-unsubscribed' : 'badge-new'}">${p.status}</span>
      ${p.status === 'pending' ? `<button class="btn-sm" onclick="postNow(${p.id})" style="margin-left:4px">▶️</button> <button class="btn-sm btn-secondary" onclick="deleteSched(${p.id})" style="margin-left:2px">✕</button>` : ''}</div>
    </div>`).join('')
    html += '</div>'
  }
  calDiv.innerHTML = html
}

function escHtml(s) {
  if (!s) return ''
  var map = {}
  map['<'] = '&lt;'
  map['>'] = '&gt;'
  map['&'] = '&amp;'
  map['"'] = '&quot;'
  map["'"] = '&#39;'
  return s.replace(/[<>&"']/g, function(c) { return map[c] })
}
function copyText(btn) { const pre = btn.parentElement.nextElementSibling; if (pre) { navigator.clipboard.writeText(pre.textContent).then(() => showToast('Copié!')) } }

// ==================== SQLi ====================
async function runSqli() {
  const div = $('sqli-result')
  const input = $('sqli-input').value
  div.innerHTML = '<p style="color:#888">Exécution...</p>'
  const res = await api('/thesis/sqli?user_id=' + encodeURIComponent(input))
  div.innerHTML = `<div style="font-size:12px">
    <div class="alert alert-info"><strong>Requête exécutée:</strong> <code style="font-size:11px">${escHtml(res.query_executed)}</code></div>
    ${res.error ? `<div class="alert alert-error">❌ ${escHtml(res.error)}</div>` : ''}
    ${res.results ? `<pre style="background:#0d0d0d;padding:12px;border-radius:4px;font-size:11px;overflow-x:auto">${escHtml(JSON.stringify(res.results, null, 2))}</pre>` : ''}
    ${res.note ? `<div style="margin-top:8px;padding:8px;border-radius:4px;background:#1a237e;color:#9fa8da;font-size:12px">${escHtml(res.note)}</div>` : ''}
    ${res.injection_tip ? `<div style="margin-top:8px;padding:8px;border-radius:4px;background:#3e2723;color:#bcaaa4;font-size:12px">💡 ${escHtml(res.injection_tip)}</div>` : ''}
  </div>`
}

async function runSqliSafe() {
  const div = $('sqli-result')
  const input = $('sqli-input').value
  div.innerHTML = '<p style="color:#888">Version sécurisée...</p>'
  const res = await api('/thesis/sqli-fixed?user_id=' + encodeURIComponent(input))
  div.innerHTML = `<div style="font-size:12px">
    <div class="alert alert-success"><strong>✅ Version protégée</strong> — Requête paramétrée: <code style="font-size:11px">${escHtml(res.query_safe)}</code></div>

    <div style="margin-top:8px;padding:8px;border-radius:4px;background:#1b5e20;color:#a5d6a7;font-size:12px">✅ ${escHtml(res.note)}</div>
  </div>`
}

// ==================== SSRF ====================
async function runSsrf() {
  const div = $('ssrf-result')
  const url = $('ssrf-input').value
  div.innerHTML = '<p style="color:#888">Requête en cours...</p>'
  const res = await api('/thesis/ssrf?url=' + encodeURIComponent(url))
  const resp = res.response_preview || JSON.stringify(res, null, 2)
  div.innerHTML = `<div style="font-size:12px">
    <div class="alert alert-info"><strong>URL appelée:</strong> <code style="font-size:11px">${escHtml(res.url_requested)}</code> → Status: ${res.status || res.error || 'N/A'}</div>
    ${res.risk ? `<div class="alert alert-error">${escHtml(res.risk)}</div>` : ''}
    ${res.explication ? `<div style="padding:8px;color:#888;font-size:11px">${escHtml(res.explication)}</div>` : ''}
    <pre style="background:#0d0d0d;padding:12px;border-radius:4px;font-size:11px;overflow-x:auto;max-height:400px">${escHtml(typeof resp === 'string' ? resp.substring(0, 3000) : JSON.stringify(resp, null, 2).substring(0, 3000))}</pre>
  </div>`
}

// ==================== IDOR ====================
async function runIdor() {
  const div = $('idor-result')
  const id = $('idor-input').value
  div.innerHTML = '<p style="color:#888">Chargement...</p>'
  const res = await api('/thesis/users/' + id)
  if (!res) return
  div.innerHTML = `<div style="font-size:12px">
    ${res.explication ? `<div style="padding:8px;color:#888;font-size:11px;margin-bottom:8px">${escHtml(res.explication)}</div>` : ''}
    <pre style="background:#0d0d0d;padding:12px;border-radius:4px;font-size:11px;overflow-x:auto">${escHtml(JSON.stringify(res.data || res, null, 2))}</pre>
    ${res.automation_hint ? `<div style="margin-top:8px;padding:8px;background:#1a237e;color:#9fa8da;font-size:11px;border-radius:4px">💻 ${escHtml(res.automation_hint)}</div>` : ''}
  </div>`
}

async function runIdorAll() {
  const div = $('idor-result')
  div.innerHTML = '<p style="color:#888">Scraping de tous les profils...</p>'
  let all = []
  for (let id = 1; id <= 5; id++) {
    const res = await api('/thesis/users/' + id)
    if (res?.data) all.push(res.data)
  }
  div.innerHTML = `<div style="font-size:12px">
    <div class="alert alert-error"><strong>⛔ ${all.length} profils extraits sans authentification</strong> — simple incrémentation d'ID</div>
    <pre style="background:#0d0d0d;padding:12px;border-radius:4px;font-size:11px;overflow-x:auto">${escHtml(JSON.stringify(all, null, 2))}</pre>
  </div>`
}

// ==================== DNS TUNNEL ====================
async function runDns() {
  const div = $('dns-result')
  const data = $('dns-input').value
  div.innerHTML = '<p style="color:#888">Encodage en cours...</p>'
  const res = await api('/thesis/dns-tunnel', { method: 'POST', body: JSON.stringify({ data }) })
  if (!res) return
  div.innerHTML = `<div style="font-size:12px">
    <div class="alert alert-info"><strong>📦 Donnée originale:</strong> ${escHtml(res.original_data)} (${res.data_size_bytes} bytes)</div>
    <div style="margin-top:8px;padding:8px;background:#151515;border-radius:4px">
      <strong>Requêtes DNS générées (${res.total_queries} queries):</strong>
      ${res.dns_queries.map((q, i) => `<div style="padding:4px 0;border-bottom:1px solid #2a2a2a;font-family:monospace;font-size:11px;color:#aaa">
        📡 ${escHtml(q)}
        <span style="color:#4fc3f7;margin-left:8px">→ ${escHtml(res.attacker_side_decoded[i]?.decoded_chunk || '')}</span>
      </div>`).join('')}
    </div>
    <div style="margin-top:8px;padding:8px;background:#3e2723;border-radius:4px;color:#bcaaa4;font-size:11px">
      ⚠️ ${escHtml(res.risk)}
    </div>
  </div>`
}
